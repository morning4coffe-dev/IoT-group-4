<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenhouse Monitor</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./index.html" aria-label="Greenhouse Monitor dashboard">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M19 3c-6.8.2-11.9 4.2-12.7 10.4-.5 3.7 1.7 6.8 5 7.6v-5.1l-2.9 1.8 1.2-3.2 1.7-1.1v-2.9h2.2v1.5l3.8-2.4-1.2 3.2-2.6 1.7V21c3.9-.7 6.7-4.1 6.7-8.3 0-2.5-.7-5.9-1.2-9.7Z" />
          </svg>
        </span>
        <span>Greenhouse Monitor</span>
      </a>
      <div class="top-actions">
        <button class="icon-button" type="button" aria-label="Toggle theme" id="themeToggle">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </svg>
        </button>
      </div>
    </header>

    <main class="page-shell">
      <section id="dashboardView">
        <div class="alert-stack" id="alertStack" aria-live="polite"></div>

        <div class="metric-grid" id="metricGrid"></div>

        <section class="panel chart-panel" aria-labelledby="chartTitle">
          <div class="panel-heading">
            <h2 id="chartTitle">Historical Data</h2>
            <div class="segmented-control" role="group" aria-label="Chart range">
              <button type="button" class="range-button active" data-range="24h">24h</button>
              <button type="button" class="range-button" data-range="7d">7d</button>
              <button type="button" class="range-button" data-range="30d">30d</button>
            </div>
          </div>
          <div class="chart-wrap">
            <canvas id="historyChart" aria-label="Temperature and humidity historical chart"></canvas>
          </div>
          <div class="legend" aria-hidden="true">
            <span><i class="legend-temp"></i>Temperature (C)</span>
            <span><i class="legend-humidity"></i>Humidity (%)</span>
            <span><i class="legend-range"></i>Optimal range</span>
          </div>
        </section>

        <section class="panel readings-panel" aria-labelledby="recentTitle">
          <div class="panel-heading">
            <h2 id="recentTitle">Recent Readings</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th></th>
                  <th>Time</th>
                  <th>Temperature</th>
                  <th>Humidity</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="recentReadings"></tbody>
            </table>
          </div>
          <div class="panel-footer">
            <a class="secondary-button" href="./index.html?view=all">View all readings</a>
          </div>
        </section>
      </section>

      <section id="allReadingsView" class="panel readings-panel all-readings" aria-labelledby="allTitle" hidden>
        <div class="panel-heading all-heading">
          <div>
            <h2 id="allTitle">All Readings</h2>
            <p>Complete measurement history</p>
          </div>
          <a class="secondary-button" href="./index.html">Back to dashboard</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th></th>
                <th>Time</th>
                <th>Temperature</th>
                <th>Humidity</th>
                <th>Status</th>
                <th>Device</th>
              </tr>
            </thead>
            <tbody id="allReadings"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
